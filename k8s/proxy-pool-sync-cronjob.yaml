apiVersion: v1
kind: ServiceAccount
metadata:
  name: kiro-proxy-pool-sync
  namespace: agent-stack-state-ext
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kiro-proxy-pool-sync
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kiro-proxy-pool-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kiro-proxy-pool-sync
subjects:
  - kind: ServiceAccount
    name: kiro-proxy-pool-sync
    namespace: agent-stack-state-ext
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kiro-proxy-pool-sync
  namespace: agent-stack-state-ext
rules:
  - apiGroups: [""]
    resources: ["secrets", "services", "pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kiro-proxy-pool-sync
  namespace: agent-stack-state-ext
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kiro-proxy-pool-sync
subjects:
  - kind: ServiceAccount
    name: kiro-proxy-pool-sync
    namespace: agent-stack-state-ext
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kiro-proxy-pool-sync
  namespace: agent-stack-state-ext
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: kiro-proxy-pool-sync
          restartPolicy: Never
          containers:
            - name: sync
              image: alpine:3.21
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-ec"]
              args:
                - |
                  apk add --no-cache bash curl jq kubectl
                  /scripts/sync-k8s-proxy-pool.sh
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: NODE_SELECTOR
                  value: kiro.rs/egress-proxy=true
                - name: PROXY_PORT
                  value: "3128"
                - name: PROXY_SCHEME
                  value: http
                - name: KIRO_SERVICE
                  value: kiro-rs
                - name: KIRO_PORT
                  value: "8990"
                - name: CONFIG_SECRET
                  value: kiro-rs-config
                - name: REQUIRE_PROXY
                  value: "false"
                - name: PRUNE_MISSING
                  value: "false"
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: kiro-proxy-pool-sync-script
                defaultMode: 0755
