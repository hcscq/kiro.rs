services:
  kiro-rs:
    # 使用国内镜像
    # image: ghcr.nju.edu.cn/${IMAGE_OWNER:-hcscq}/kiro-rs:${IMAGE_TAG:-latest}
    image: ghcr.io/${IMAGE_OWNER:-hcscq}/kiro-rs:${IMAGE_TAG:-latest}
    container_name: kiro-rs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8990:8990"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ./config/:/app/config/
    restart: unless-stopped
